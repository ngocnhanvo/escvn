name: Deploy Website to DirectAdmin

on:
  repository_dispatch:
    types: [wp_trigger_build]

  push:
    branches:
      - master

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # Lấy source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Cài pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Cài Node.js + cache pnpm (đây là cache của node_modules, khác với cache dữ liệu của bạn)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      # Cài dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tạo file .env từ GitHub Secrets
      - name: Make .env
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      # ==========================================
      # THÊM BƯỚC NÀY ĐỂ XỬ LÝ CACHE DỮ LIỆU
      # ==========================================
      - name: Phục hồi .cache từ GitHub Cache
        uses: actions/cache@v4
        with:
          path: ./.cache
          # Sử dụng run_id để ĐẢM BẢO key này luôn là duy nhất cho mỗi lần chạy.
          # GitHub Actions chắc chắn sẽ SAVE lại cache mới sau khi bước Build Project hoàn tất.
          key: ${{ runner.os }}-products-cache-${{ github.run_id }}
          
          # GitHub sẽ tự động tìm bản cache có tiền tố này được lưu GẦN ĐÂY NHẤT để tải về.
          restore-keys: |
            ${{ runner.os }}-products-cache-
      # ==========================================

      # Build project (Lúc này thư mục .cache đã được tải về nếu có lần chạy trước)
      - name: Build Project
        run: pnpm run build-git

      # Chuẩn bị file deploy (Thư mục .cache mới đã được cập nhật qua lệnh build trên)
      - name: Zip Build Folder
        run: |
          mkdir -p deploy

          # Copy file .env
          cp .env deploy/

          # Copy thư mục .cache (Giữ nguyên logic của bạn để đẩy qua FTP)
          # if [ -d ".cache" ]; then
          #   cp -r .cache deploy/
          # else
          #   echo "Warning: .cache folder not found!"
          # fi

          # Copy toàn bộ nội dung trong dist vào deploy
          cp -r dist/* deploy/

          cd deploy
          zip -r ../escvn.zip .

      # Upload file zip lên hosting
      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/
          dangerous-clean-slate: false
          include: |
            escvn.zip
          exclude: |
            **
            !escvn.zip

      # Gọi script giải nén trên hosting
      - name: Trigger Remote Unzip
        run: |
          source .env
          curl -s "$WC_URL/unzip.php"