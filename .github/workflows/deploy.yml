name: Deploy Website to DirectAdmin

# Kích hoạt khi có hành động PUSH vào nhánh master HOẶC gọi từ WordPress
on:
  repository_dispatch:
    types: [wp_trigger_build] # Trùng với event_type khai báo trong PHP
  push:
    branches:
      - master

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
    # Bước 1: Lấy code từ GitHub về server ảo của GitHub
    - name: Get latest code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt NodeJS chuẩn trên server ảo
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Khuyên dùng bản LTS gõ gọn '20' hoặc '22', tự động lấy minor version mới nhất
        cache: 'npm'

    # Bước 3: Cài đặt thư viện (Chỉ chạy khi package-lock.json có thay đổi nhờ vào cache ở trên)
    - name: Install dependencies
      run: npm ci # Tối ưu hoàn toàn cho CI/CD, thay thế hoàn toàn cho npm install

    # Bước 4: Tự động tạo file .env từ GitHub Secret trước khi build
    - name: Make env file
      run: |
        echo "${{ secrets.ENV_FILE }}" > .env

    # Bước 5: Build dự án ra thư mục dist (Đã bỏ hoàn toàn npm install thừa ở đây)
    - name: Build Project
      run: |
        npm run build # Lệnh này sẽ tạo ra thư mục 'dist' hoặc 'build'

    # Bước 6: Nén toàn bộ nội dung bên trong thư mục dist thành file escvn.zip
    - name: Zip Build Folder
      run: |
        mkdir deploy

        cp .env deploy/
        cp -r dist/* deploy/

        cd deploy
        zip -r ../escvn.zip .
    # Bước 7: Tự động sync (đồng bộ) thư mục dist lên Hosting qua tài khoản FTP
    - name: Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}      # Địa chỉ IP hoặc FTP host của DirectAdmin
        username: ${{ secrets.FTP_USERNAME }}  # Tên tài khoản FTP (hoặc user DA)
        password: ${{ secrets.FTP_PASSWORD }}  # Mật khẩu FTP
        local-dir: ./                      # Nhớ kiểm tra xem dự án của bạn build ra 'dist' hay 'build' hay 'out' nhé
        server-dir: /public_html/               # Thư mục đích trên hosting DirectAdmin
        dangerous-clean-slate: false
        exclude: |                              # Ép bỏ qua mọi thứ khác, chỉ đẩy đúng file zip
          **
          !escvn.zip

    # BƯỚC 8: Gọi file unzip.php từ xa để DirectAdmin tự giải nén
    - name: Trigger Remote Unzip
      run: |
        source .env
        curl -s "$WC_URL/unzip.php"